name: Daily Auto Blog Post

on:
  schedule:
    - cron: "0 23 * * *"
    - cron: "30 9 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 숏츠 생성으로 시간 늘림

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-nanum

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run auto blog + shorts generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          EN_BLOGGER_REFRESH_TOKEN: ${{ secrets.EN_BLOGGER_REFRESH_TOKEN }}
          EN_BLOGGER_CLIENT_ID: ${{ secrets.EN_BLOGGER_CLIENT_ID }}
          EN_BLOGGER_CLIENT_SECRET: ${{ secrets.EN_BLOGGER_CLIENT_SECRET }}
          KO_BLOG_ID: ${{ secrets.KO_BLOG_ID }}
          EN_BLOG_ID: ${{ secrets.EN_BLOG_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py
