name: Daily Auto Blog Post

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto blog generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
          BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
          BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
          EN_BLOGGER_REFRESH_TOKEN: ${{ secrets.EN_BLOGGER_REFRESH_TOKEN }}
          EN_BLOGGER_CLIENT_ID: ${{ secrets.EN_BLOGGER_CLIENT_ID }}
          EN_BLOGGER_CLIENT_SECRET: ${{ secrets.EN_BLOGGER_CLIENT_SECRET }}
          KO_BLOG_ID: ${{ secrets.KO_BLOG_ID }}
          EN_BLOG_ID: ${{ secrets.EN_BLOG_ID }}
        run: python main.py
