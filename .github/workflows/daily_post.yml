name: Daily Auto Blog Post

on:
  schedule:
    # 매일 오전 9시 KST (00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run auto blog generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOGGER_CREDENTIALS_JSON: ${{ secrets.BLOGGER_CREDENTIALS_JSON }}
          KO_BLOG_ID: ${{ secrets.KO_BLOG_ID }}
          EN_BLOG_ID: ${{ secrets.EN_BLOG_ID }}
        run: python main.py
